<!-- Toolbar -->
<app-toolbar 
  [languages]="languages()"
  [selectedLanguage]="selectedLanguage()"
  [isRunning]="isRunning()"
  [templates]="templates"
  [autoRun]="autoRun()"
  (run)="runCode()"
  (clear)="clearConsole()"
  (download)="downloadCode()"
  (languageSelect)="selectLanguage($event)"
  (templateSelect)="loadTemplate($event)"
  (autoRunChange)="onAutoRunChange($event)">
</app-toolbar>

<!-- IDE Layout -->
<main class="ide-layout">
  
  @if (isWebMode()) {
    <!-- Web Mode (HTML/CSS/JS) Layout -->
    <as-split direction="horizontal" gutterSize="8" (dragEnd)="onDragEnd()">
      
      <!-- Editors Left -->
      <as-split-area [size]="50" class="editor-side">
        <app-editor-panel
          [htmlCode]="htmlCode()"
          [cssCode]="cssCode()"
          [jsCode]="jsCode()"
          (htmlChange)="onHtmlChange($event)"
          (cssChange)="onCssChange($event)"
          (jsChange)="onJsChange($event)">
        </app-editor-panel>
      </as-split-area>

      <!-- Preview + Console Right -->
      <as-split-area [size]="50" class="preview-side">
        <as-split direction="vertical" gutterSize="8">
          <as-split-area [size]="70">
            <app-preview-frame [srcdoc]="compiledWebOutput()"></app-preview-frame>
          </as-split-area>
          <as-split-area [size]="30" class="console-area">
            <app-output-console 
              (clearConsole)="clearConsole()"
            />
          </as-split-area>
        </as-split>
      </as-split-area>

    </as-split>
  } @else {
    <!-- Backend Mode (Piston API) Layout -->
    <as-split direction="horizontal" gutterSize="8" (dragEnd)="onDragEnd()">
      
      <!-- Editor Left -->
      <as-split-area [size]="60" class="editor-side">
        @if (selectedLanguage()) {
          <app-generic-editor
            [code]="currentBackendCode"
            [language]="selectedLanguage()!.monacoLanguage"
            (codeChange)="onBackendCodeChange($event)"
          />
        }
      </as-split-area>

      <!-- Console Right -->
      <as-split-area [size]="40" class="console-area backend-console">
        <app-output-console 
          [result]="executionResult()" 
          (clearConsole)="clearConsole()"
        />
      </as-split-area>

    </as-split>
  }
  
</main>
